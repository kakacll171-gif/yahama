<html>
    <head>
        <style>

            .dropbtn {
                background-color: #ff66ccd5;
                color: white;
                padding: 16px;
                font-size: 16px;
                border: none;
                cursor: pointer;
            }

            .dropdown{
                position: relative;
            }
            .dropdown-content{
                display: none;
                position: absolute;
                background-color: #feffbc;
                min-width: 200px;
                box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            }

            .dropdown-content a{
                color: black;
                padding: decoration: none;
                display: block;
            }

            .dropdown-content a:hover{
                background-color: rgba(243, 183, 19, 0.514);
                color:white;
            }

            .dropdown:hover .dropdown-content{display: block;
            }

            .dropdown:hover .dropbtn{background-color: #f0126e;
            }
        </style>
    </head>
    <body>
        <h2>dropdown menu</h2>
        <p>pindahkan kursor saat memilih menu</p>

        <div class="dropdown">

            <button class="dropbtn">dropdown menu</button>

            <div class="dropdown-content">
                <a href="#">link 1</a>
                <a href="#">link 2</a>
                <a href="#">link 3</a>
                </div>
                </div>
    </body>
</html>
